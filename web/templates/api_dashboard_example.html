{% extends "base.html" %}

{% block title %}API-First Dashboard Example | QuantumShield{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/api_dashboards.css') }}" />
{% endblock %}

{% block content %}
<section class="hero" style="padding-bottom:1rem;">
  <h2 class="hero-title" style="font-size:2rem;">{{ page_title }}</h2>
  <p class="hero-subtitle">Frontend → Flask API → MySQL → JSON → Render</p>
</section>

<section data-api-table-page class="glass-card" style="padding:1rem;">
  <div data-api-error style="display:none;background:rgba(248,113,113,0.15);border:1px solid var(--danger);padding:0.8rem;border-radius:8px;margin-bottom:1rem;"></div>

  <div style="display:flex;gap:0.5rem;align-items:center;margin-bottom:1rem;">
    <input type="text" data-api-search-input class="asset-modal-input" placeholder="Search..." />
    <button type="button" data-api-search-btn class="scan-button">Search</button>
  </div>

  <section data-api-kpis class="overview-grid" style="margin-bottom:1rem;"></section>

  <div class="table-container" style="margin-bottom:1rem;overflow:auto;">
    <table class="scans-table" style="width:100%;">
      <thead>
        <tr data-api-table-head></tr>
      </thead>
      <tbody data-api-table-body>
        <tr><td colspan="6">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <div style="display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;">
    <div>Total: <strong data-api-total>0</strong></div>
    <div>Page <strong data-api-page>1</strong> / <strong data-api-total-pages>1</strong></div>
    <div style="display:flex;gap:0.5rem;">
      <button type="button" data-api-prev class="scan-button">Prev</button>
      <button type="button" data-api-next class="scan-button">Next</button>
    </div>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/api_client.js') }}"></script>
<script src="{{ url_for('static', filename='js/universal_table.js') }}"></script>
<script src="{{ url_for('static', filename='js/api-table.js') }}"></script>
<script type="application/json" id="api-columns-json">{{ columns|tojson }}</script>
<script type="application/json" id="api-extra-params-json">{{ extra_params|tojson }}</script>
<script type="application/json" id="api-config-json">{{ {
  'api_endpoint': api_endpoint,
  'default_sort': default_sort,
  'default_order': default_order,
  'default_page_size': default_page_size
}|tojson }}</script>
<script>
  window.addEventListener('DOMContentLoaded', function () {
    const columns = JSON.parse(document.getElementById('api-columns-json').textContent || '[]');
    const extraParams = JSON.parse(document.getElementById('api-extra-params-json').textContent || '{}');
    const cfg = JSON.parse(document.getElementById('api-config-json').textContent || '{}');
    window.QuantumShieldApiTable.initApiTablePage({
      rootSelector: '[data-api-table-page]',
      apiUrl: cfg.api_endpoint,
      columns: columns,
      sort: cfg.default_sort || 'id',
      order: cfg.default_order || 'asc',
      pageSize: Number(cfg.default_page_size || 25),
      extraParams: extraParams,
    });
  });
</script>
{% endblock %}
