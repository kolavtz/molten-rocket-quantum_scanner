<!-- Asset Edit Modal – uses JS-managed overlay centering -->
<div id="assetEditModal" style="display:none; position:fixed; inset:0; opacity:0; visibility:hidden; pointer-events:none;" role="dialog" aria-modal="true" aria-labelledby="assetEditTitle">
  <div class="asset-modal-card">
    <div class="section-header" style="margin-bottom:1rem; display:flex; justify-content:space-between; align-items:flex-start;">
      <div>
        <h3 id="assetEditTitle" style="margin:0; font-size:1.1rem; font-weight:800;">Edit Asset</h3>
        <div id="assetEditSubtitle" style="font-size:0.78rem; color:var(--text-secondary); margin-top:0.2rem;">Update owner and risk classification.</div>
      </div>
      <button type="button" class="inv-modal-close" data-close-asset-edit aria-label="Close">×</button>
    </div>

    <form id="assetEditForm" method="post" action="">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="asset_id" id="assetEditAssetId" value="">
      <input type="hidden" name="selected_asset_ids" id="assetEditSelectedIds" value="">

      <div class="asset-modal-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
        <div style="grid-column:span 2;">
          <label class="asset-modal-label" for="assetEditName" style="display:block; font-size:0.75rem; font-weight:700; color:var(--text-secondary); margin-bottom:0.4rem;">Asset Name</label>
          <input id="assetEditName" class="asset-modal-input inventory-input" type="text" readonly style="cursor:default; opacity:0.6;">
        </div>
        <div style="grid-column:span 2;">
          <label class="asset-modal-label" for="assetEditUrl" style="display:block; font-size:0.75rem; font-weight:700; color:var(--text-secondary); margin-bottom:0.4rem;">URL</label>
          <input id="assetEditUrl" class="asset-modal-input inventory-input" type="text" readonly style="cursor:default; opacity:0.6;">
        </div>
        <div>
          <label class="asset-modal-label" for="assetEditOwner" style="display:block; font-size:0.75rem; font-weight:700; color:var(--text-secondary); margin-bottom:0.4rem;">Owner</label>
          <input id="assetEditOwner" name="owner" class="asset-modal-input inventory-input" type="text" placeholder="Owner / Team">
        </div>
        <div>
          <label class="asset-modal-label" for="assetEditRisk" style="display:block; font-size:0.75rem; font-weight:700; color:var(--text-secondary); margin-bottom:0.4rem;">Risk Level</label>
          <select id="assetEditRisk" name="risk_level" class="asset-modal-select inventory-input">
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
            <option value="Critical">Critical</option>
          </select>
        </div>
        <div style="grid-column:span 2;">
          <label class="asset-modal-label" for="assetEditLastScan" style="display:block; font-size:0.75rem; font-weight:700; color:var(--text-secondary); margin-bottom:0.4rem;">Last Scan</label>
          <input id="assetEditLastScan" class="asset-modal-input inventory-input" type="text" readonly style="cursor:default; opacity:0.6;">
        </div>
      </div>

      <div class="asset-modal-actions" style="display:flex; justify-content:flex-end; gap:0.75rem; margin-top:1.5rem;">
        <button type="button" class="button secondary" data-close-asset-edit>Cancel</button>
        <button type="submit" class="button">Save Changes</button>
      </div>
    </form>
  </div>
</div>
