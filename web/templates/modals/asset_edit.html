<!-- Asset Edit Modal – standardized with inv-modal-overlay -->
<div id="assetEditModal" class="inv-modal-overlay" role="dialog" aria-modal="true" aria-hidden="true" style="display:none; opacity:0; visibility:hidden; pointer-events:none;">
    <div class="inv-modal-shell" style="max-width:560px;">
        <div class="inv-modal-header">
            <div>
                <h2 id="assetEditTitle" style="margin:0;">Edit Asset</h2>
                <div id="assetEditSubtitle" style="font-size:0.78rem; color:var(--text-secondary); margin-top:2px; font-family:'JetBrains Mono',monospace;">Update owner and risk classification.</div>
            </div>
            <button type="button" class="inv-modal-close" data-close-asset-edit aria-label="Close">×</button>
        </div>

        <div class="inv-modal-body">
            <form id="assetEditForm" method="post" action="">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <input type="hidden" name="asset_id" id="assetEditAssetId" value="">
                <input type="hidden" name="selected_asset_ids" id="assetEditSelectedIds" value="">

                <div class="asset-modal-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:1.25rem;">
                    <div style="grid-column:span 2;">
                        <label class="asset-modal-label" for="assetEditName" style="display:block; font-size:0.75rem; font-weight:700; color:var(--text-secondary); margin-bottom:0.4rem;">Asset Name</label>
                        <input id="assetEditName" class="inventory-input" type="text" readonly style="cursor:default; opacity:0.6;">
                    </div>
                    <div style="grid-column:span 2;">
                        <label class="asset-modal-label" for="assetEditUrl" style="display:block; font-size:0.75rem; font-weight:700; color:var(--text-secondary); margin-bottom:0.4rem;">URL</label>
                        <input id="assetEditUrl" class="inventory-input" type="text" readonly style="cursor:default; opacity:0.6;">
                    </div>
                    <div>
                        <label class="asset-modal-label" for="assetEditOwner" style="display:block; font-size:0.75rem; font-weight:700; color:var(--text-secondary); margin-bottom:0.4rem;">Owner</label>
                        <input id="assetEditOwner" name="owner" class="inventory-input" type="text" placeholder="Owner / Team">
                    </div>
                    <div>
                        <label class="asset-modal-label" for="assetEditRisk" style="display:block; font-size:0.75rem; font-weight:700; color:var(--text-secondary); margin-bottom:0.4rem;">Risk Level</label>
                        <select id="assetEditRisk" name="risk_level" class="inventory-input">
                            <option value="Low">Low</option>
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                            <option value="Critical">Critical</option>
                        </select>
                    </div>
                    <div style="grid-column:span 2;">
                        <label class="asset-modal-label" for="assetEditLastScan" style="display:block; font-size:0.75rem; font-weight:700; color:var(--text-secondary); margin-bottom:0.4rem;">Last Scan</label>
                        <input id="assetEditLastScan" class="inventory-input" type="text" readonly style="cursor:default; opacity:0.6;">
                    </div>
                </div>

                <div class="asset-modal-actions" style="display:flex; justify-content:flex-end; gap:0.75rem; margin-top:2rem;">
                    <button type="button" class="button secondary" data-close-asset-edit>Cancel</button>
                    <button type="submit" class="button">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
