name: CI/CD — Test & Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit tests
        run: |
          python -m pytest -q

  deploy:
    name: Deploy to production
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_SSH_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: ${{ secrets.PRODUCTION_SSH_PORT }}
          script: |
            set -euo pipefail
            DEPLOY_DIR="${{ secrets.PRODUCTION_DEPLOY_PATH }}"
            BRANCH="${{ secrets.PRODUCTION_BRANCH }}"
            if [ -z "$DEPLOY_DIR" ]; then
              echo "PRODUCTION_DEPLOY_PATH secret is required. Aborting."
              exit 1
            fi
            BRANCH=${BRANCH:-main}
            echo "Deploying branch $BRANCH to $DEPLOY_DIR"
            cd "$DEPLOY_DIR"
            git fetch --all --prune
            git reset --hard origin/$BRANCH
            python -m pip install --upgrade pip
            pip install -r requirements.txt || true
            # Restart systemd service (replace 'quantumshield' with your service name)
            if command -v systemctl >/dev/null 2>&1; then
              sudo systemctl restart quantumshield.service || true
            fi
            # Fallback: Docker Compose
            if [ -f docker-compose.yml ]; then
              docker-compose pull || true
              docker-compose up -d --build || true
            fi
*** End Patch