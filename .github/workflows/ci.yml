name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit locust

      - name: Security scan - bandit
        run: bandit -r web src -x tests,tmp

      - name: Dependency audit
        run: pip-audit -r requirements.txt

      - name: Run smoke tests
        run: pytest tests/smoke -q

      - name: Run unit + integration + security + performance tests with coverage
        run: pytest tests/unit tests/integration tests/security tests/performance -q --cov=src --cov=web --cov-report=xml --cov-report=term

      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
